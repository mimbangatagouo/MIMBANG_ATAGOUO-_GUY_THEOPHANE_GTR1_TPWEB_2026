<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Contact-Mon mini-site</title>
    <link rel="stylesheet" href="style.css">
</head>
  <body>
    </body>
    <header>
    <h1>Page de Conctact</h1>
    </header>
    <nav>
        <a href="index.html">Accueil</a>
        <br>
        <a href="presentation.html">Presentation </a>
        <br>
        <a href="contact.html">Contact</a>
    </nav>
    <h2>Formulaire de contact</h2>
    <p>Veuillez remplire ce formulaire pour envoyer un message</p>
    <form>
      <label for="nom">Nom</label>
      <input type="text" id="nom"name="nom" placeholder="Entrez votre Nom" required>
      <br>
      <br>
      <label for="prenom">Prenom</label>
      <input type="text"id="prenom" name="prenom" placeholder="entrez votre Prenom" required>
      <br>
      <br>
      <label for="Email">Adresse Email :</label> 
      <input type="email" id="email" name="email" placeholder="Ex:TheophaneGuy@gmail.com" required>
      <br>
      <br>
      <label for="telephone">Numero de telephone</label>
      <input type="tel" id="telephone" name="telephone" placeholder="+237 6 XX XX XX XX">
      <br>
      <br>
       <label for="motif"name="motif"required>Motif du message</label>
      <select id="motif" name="motif" required>
        <option value="">Choisir un motif</option>
        <option value="information">Demande d'information </option>
        <option value="stage">Demande de stage</option>
        <option value="projet">Proposition de projet</option>
        <option value="autre">Autre Demande</option>
        </select>
        <br>
        <br>
      <label for="domaine">Domaine d'interet</label>
      <select id="Domaine" name="dodmaine" required>
        <option value="reseaux">reseaux informatique</option>
        <option value="Cybersecurite">Cybersecurite</option>
        <option value="Developpement WEB">Developpement WEB</option>
        <option value="administration-systeme">administration-systeme</option>
      </select>
      <br>
      <br>
      <p>Statut du navigateur</p>
      <input type="radio" id="etudiant" name="statut" value="etudiant" required>
      <label for="etudiant">Etudiant</label> 
      <br>
      <input type="radio" id="enseignant" name="statut" value="enseignant">
      <label for="enseignant">Enseignant</label>
      <br>
      <input type="radio"id="professionnel" name="statut"value="professionnel">
      <label for="professionnel">professionnel</label>
      <br>
      <br>   
      <label for="message">Message :</label>
      <br>
      <textarea id="Message" name="message" rows="5" cols="40" placeholder="Ecrivez votre message ici" required></textarea>
      <br>
      <br>
      <input type="checkbox"id="confirmation" name="confirmation"required>
      <label for="confirmation">Je confirme que les informations saisies sont correctes</label>
      <br> 
      <br>      
      <button type="submit">Envoyer</button>
      <button type="reset">Effacer</button>
    </footer>
     <footer>
            <p>&copy;2026 - Mon mini-site</p>
        </footer>
  </body>
</html>
